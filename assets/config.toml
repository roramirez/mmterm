# mmterm default configuration

[font]
family = "Noto Sans Mono"
size = 16.0

[window]
width           = 800
height          = 600
title           = "mmterm"
cursor_blink_ms = 500
inactive_dim    = 0.55
detect_urls     = true

[shell]
# program = "/bin/zsh"

[terminal]
scrollback_lines = 10000

[logging]
# Start logging automatically for every new pane (Ctrl+Shift+L to toggle per-pane)
auto_log = false
# Directory for log files; empty string means ~/.mmterm
log_dir  = ""

[status_bar]
# Right-side format string. Supported tokens: %pwd (OSC 7 cwd), %date{fmt} (strftime format).
# Example: right = "%pwd  %date{%H:%M}"
right = "%pwd"

[general]
# Save and restore tabs, splits, and CWDs across sessions.
# When true, quitting shows a prompt: [s] save and quit  [q] quit  [Esc] cancel
restore_session = true

# Show a screen flash on BEL in addition to the status bar indicator.
# false = only the status bar "●" dot is shown (default).
visual_bell = false

# Check GitHub once per day for a newer release (one network request on startup).
# false disables all update network activity.
auto_update_check = true

# Linux only, OPT-IN (default false): when an update is found, silently download +
# verify + self-replace the binary in the background (applies on next launch). Leave
# false to only show an update-available badge in the status bar. On macOS, updating
# is always user-initiated by clicking the badge.
auto_update_install = false

[colors]
background = "#121212"
foreground = "#a0a0a0"
cursor     = "#bbbbbb"
selection  = "#3d3d3d"

# 16-color ANSI palette:
# [black, red, green, yellow, blue, magenta, cyan, white,
#  bright-black, bright-red, bright-green, bright-yellow,
#  bright-blue, bright-magenta, bright-cyan, bright-white]
palette = [
  "#1b1d1e",
  "#f92672",
  "#a6e22e",
  "#fd971f",
  "#66d9ef",
  "#9e6ffe",
  "#5e7175",
  "#ccccc6",
  "#505354",
  "#ff669d",
  "#beed5f",
  "#e6db74",
  "#66d9ef",
  "#9e6ffe",
  "#a3babf",
  "#f8f8f2",
]

[keybindings]
# Override, add, or disable keyboard shortcuts. Format:
#   "binding" = "action-name"      ("none" disables a built-in default)
# Modifiers (order-insensitive, joined with '+'): ctrl shift alt cmd
#   cmd resolves to Command (⌘) on macOS and Super on Linux/Windows.
# Key tokens: a single character (v , + =) or a named key
#   (enter escape tab space backspace delete pageup pagedown home end
#    arrowup arrowdown arrowleft arrowright f1..f12).
# Chord (Ctrl+W prefix): a space-separated tail key, e.g. "ctrl+w x".
# Bare unmodified characters are rejected in global scope (they would shadow typing).
# Examples (commented out — empty table = full built-in defaults):
#   "cmd+v"    = "paste"
#   "cmd+k"    = "none"
#   "ctrl+e"   = "new_tab"
#   "ctrl+w x" = "close_pane"
# See doc/SPEC.md "Configurable Keymap" for the full action-name list.
