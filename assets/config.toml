# mmterm default configuration

[font]
family = "Noto Sans Mono"
size = 16.0

[window]
width           = 800
height          = 600
title           = "mmterm"
cursor_blink_ms = 500
inactive_dim    = 0.55
detect_urls     = true

[shell]
# program = "/bin/zsh"

[terminal]
scrollback_lines = 10000

[logging]
# Start logging automatically for every new pane (Ctrl+Shift+L to toggle per-pane)
auto_log = false
# Directory for log files; empty string means ~/.mmterm
log_dir  = ""

[status_bar]
# Right-side format string. Supported tokens: %pwd (OSC 7 cwd), %date{fmt} (strftime format).
# Example: right = "%pwd  %date{%H:%M}"
right = "%pwd"

[general]
# Save and restore tabs, splits, and CWDs across sessions.
# When true, quitting shows a prompt: [s] save and quit  [q] quit  [Esc] cancel
restore_session = true

# Show a screen flash on BEL in addition to the status bar indicator.
# false = only the status bar "●" dot is shown (default).
visual_bell = false

# Check GitHub once per day for a newer release (one network request on startup).
# false disables all update network activity.
auto_update_check = true

# Linux only: when an update is found, silently download + verify + self-replace the
# binary in the background (applies on next launch). false = notify only (status-bar
# badge). On macOS, updating is always user-initiated by clicking the badge.
auto_update_install = true

[colors]
background = "#121212"
foreground = "#a0a0a0"
cursor     = "#bbbbbb"
selection  = "#3d3d3d"

# 16-color ANSI palette:
# [black, red, green, yellow, blue, magenta, cyan, white,
#  bright-black, bright-red, bright-green, bright-yellow,
#  bright-blue, bright-magenta, bright-cyan, bright-white]
palette = [
  "#1b1d1e",
  "#f92672",
  "#a6e22e",
  "#fd971f",
  "#66d9ef",
  "#9e6ffe",
  "#5e7175",
  "#ccccc6",
  "#505354",
  "#ff669d",
  "#beed5f",
  "#e6db74",
  "#66d9ef",
  "#9e6ffe",
  "#a3babf",
  "#f8f8f2",
]
